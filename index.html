<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NAS Climate Visualizer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:sans-serif; display:flex; height:100vh; background:#0d0d1a; }

    #sidebar {
      width:420px; min-width:420px; padding:18px;
      background:#1a1a2e; color:white;
      overflow-y:auto; display:flex;
      flex-direction:column; gap:12px;
    }

    h2 { color:#f8fafc; font-size:17px; letter-spacing:.5px; }

    .section { background:#16213e; border-radius:8px; padding:14px; }
    .section-title {
      font-size:10px; text-transform:uppercase;
      letter-spacing:1.5px; color:#64748b; margin-bottom:10px;
    }

    .tab-group { display:flex; gap:6px; flex-wrap:wrap; }
    .tab {
      padding:6px 12px; border-radius:20px;
      border:1px solid #334155; background:transparent;
      color:#94a3b8; font-size:12px; cursor:pointer; transition:.2s;
    }
    .tab.active-wave   { background:#8b5cf6; border-color:#8b5cf6; color:white; }
    .tab.active-precip { background:#0ea5e9; border-color:#0ea5e9; color:white; }
    .tab.active-frag   { background:#ef4444; border-color:#ef4444; color:white; }
    .tab.disabled      { opacity:.4; cursor:not-allowed; }

    #point-info { font-size:13px; color:#94a3b8; line-height:1.8; }
    #point-info span { color:#e94560; font-weight:bold; }

    .hint {
      font-size:11px; color:#0ea5e9;
      padding:6px 8px; background:#0c2340;
      border-radius:4px; margin-top:4px;
    }

    label { display:block; font-size:11px; color:#94a3b8; margin-bottom:3px; margin-top:8px; }
    .check-row { display:flex; align-items:center; gap:8px; font-size:12px; color:#94a3b8; }
    .check-row input { width:15px; height:15px; cursor:pointer; }
    input[type=number] {
      width:100%; padding:7px 10px;
      background:#0f172a; color:white;
      border:1px solid #334155; border-radius:4px; font-size:13px;
    }
    input[type=number]:focus { border-color:#e94560; outline:none; }
    .row { display:flex; gap:8px; }
    .row > * { flex:1; }

    /* Legend */
    .legend-bar {
      height:12px; border-radius:4px; margin-top:6px;
      background: linear-gradient(to right, #eff6ff, #3b82f6, #1e3a5f);
    }
    .legend-labels {
      display:flex; justify-content:space-between;
      font-size:10px; color:#94a3b8; margin-top:2px;
    }

    #query-btn {
      padding:10px; background:#e94560; color:white;
      border:none; border-radius:6px;
      font-size:14px; cursor:pointer; transition:.2s;
    }
    #query-btn:hover    { background:#c73652; }
    #query-btn:disabled { background:#334155; cursor:not-allowed; }

    #status { font-size:12px; color:#64748b; min-height:14px; }

    .chart-box {
      background:white; border-radius:8px;
      padding:14px; margin-bottom:10px;
    }
    .chart-box h4 { font-size:12px; color:#334155; margin-bottom:8px; }
    .chart-box small { color:#94a3b8; }

    .null-warning {
      font-size:11px; color:#f59e0b;
      margin-top:6px; padding:6px 8px;
      background:#451a03; border-radius:4px;
    }

    #map { flex:1; }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>🌊 NAS Climate Visualizer</h2>

  <!-- Dataset 選擇 -->
  <div class="section">
    <div class="section-title">Data Type</div>
    <div class="tab-group">
      <button class="tab active-wave"
              onclick="setDataset('wave_surge', this)">
        🌊 Wave Surge
      </button>
      <button class="tab disabled" onclick="notAvailable()">
        🌧 Precipitation
      </button>
      <button class="tab disabled" onclick="notAvailable()">
        ⚠️ Fragility
      </button>
    </div>
  </div>

  <!-- 選點資訊 -->
  <div class="section">
    <div class="section-title">Selected Location</div>
    <div id="point-info">點擊藍色區域選取位置</div>
    <div class="hint">💡 藍色區域為有效資料範圍</div>
  </div>

  <!-- 圖例 -->
  <div class="section">
    <div class="section-title">Flood100 Value (m)</div>
    <div class="legend-bar"></div>
    <div class="legend-labels">
      <span>0 m</span>
      <span>2 m</span>
      <span>4+ m</span>
    </div>
  </div>

  <!-- Y 軸範圍 -->
  <div class="section">
    <div class="section-title">Y-Axis Range (optional)</div>
    <div class="check-row">
      <input type="checkbox" id="custom-y" onchange="toggleY()">
      <span>自訂 Y 軸 min / max</span>
    </div>
    <div id="y-inputs" style="display:none">
      <div class="row">
        <div><label>Min</label>
          <input type="number" id="y-min" placeholder="auto"></div>
        <div><label>Max</label>
          <input type="number" id="y-max" placeholder="auto"></div>
      </div>
    </div>
  </div>

  <div id="status"></div>
  <div id="charts-area"></div>
</div>

<div id="map"></div>

<script>
const API = "https://nas-clim-api.onrender.com";

let selectedDataset = "wave_surge";
let selectedLat     = null;
let selectedLon     = null;
let marker          = null;
let charts          = [];
let gridLayer       = null;

// ── 地圖 ──────────────────────────────────────────────────────
const map = L.map("map").fitBounds([
  [29.3, -95.5],
  [30.1, -94.5]
]);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:"© OpenStreetMap"
}).addTo(map);

// 點擊地圖
map.on("click", e => {
  selectedLat = parseFloat(e.latlng.lat.toFixed(4));
  selectedLon = parseFloat(e.latlng.lng.toFixed(4));

  document.getElementById("point-info").innerHTML =
    `lat: <span>${selectedLat}</span><br>lon: <span>${selectedLon}</span>`;

  if (marker) marker.remove();
  marker = L.marker([selectedLat, selectedLon]).addTo(map);

  // 直接查詢，不需要按鈕
  runQuery();
});

// ── 顏色對應（flood100 值 → 顏色）───────────────────────────
function valueToColor(val, maxVal) {
  if (val === null) return null;
  const t = Math.min(val / maxVal, 1);
  // 白 → 藍 → 深藍
  const r = Math.round(239 - t * (239 - 30));
  const g = Math.round(246 - t * (246 - 58));
  const b = Math.round(255 - t * (255 - 95));
  return `rgba(${r},${g},${b},0.65)`;
}

// ── 載入並繪製格點覆蓋層 ─────────────────────────────────────
async function loadGrid(datasetId) {
  document.getElementById("status").textContent = "載入資料範圍...";

  try {
    const res  = await fetch(`${API}/query/${datasetId}/grid?variable=flood100&downsample=15`);
    const data = await res.json();

    // 清除舊的格點層
    if (gridLayer) {
      gridLayer.clearLayers();
    } else {
      gridLayer = L.layerGroup().addTo(map);
    }

    const lons    = data.lons;
    const lats    = data.lats;
    const values  = data.values;
    const maxVal  = 4.0;

    // 計算每個格點的大小
    const dLon = lons.length > 1 ? Math.abs(lons[1] - lons[0]) : 0.03;
    const dLat = lats.length > 1 ? Math.abs(lats[1] - lats[0]) : 0.03;

    const hasData = data.has_data;

    for (let i = 0; i < lons.length; i++) {
      for (let j = 0; j < lats.length; j++) {
        if (!hasData[i][j]) continue;  // 沒資料跳過

        const bounds = [
          [lats[j] - dLat/2, lons[i] - dLon/2],
          [lats[j] + dLat/2, lons[i] + dLon/2],
        ];

        L.rectangle(bounds, {
          color:       "transparent",
          fillColor:   "rgba(180,180,180,0.4)",
          fillOpacity: 0.4,
          weight:      0,
        }).addTo(gridLayer);
      }
    }

    document.getElementById("status").textContent = "✓ 點擊藍色區域查詢";

  } catch(e) {
    document.getElementById("status").textContent = `✗ 無法載入格點：${e.message}`;
  }
}

// 啟動時載入格點
loadGrid("wave_surge");

// ── Dataset 切換 ──────────────────────────────────────────────
function setDataset(name, btn) {
  selectedDataset = name;
  document.querySelectorAll(".tab:not(.disabled)").forEach(t => {
    t.className = "tab";
  });
  const classMap = {
    wave_surge: "active-wave",
    precipitation: "active-precip",
    fragility: "active-frag",
  };
  btn.className = `tab ${classMap[name]}`;
  clearCharts();
  loadGrid(name);
}

function notAvailable() {
  document.getElementById("status").textContent = "⚠ 此資料集尚未開放";
}

// ── Y 軸 ──────────────────────────────────────────────────────
function toggleY() {
  document.getElementById("y-inputs").style.display =
    document.getElementById("custom-y").checked ? "block" : "none";
}

function getYRange(dataMin, dataMax) {
  if (!document.getElementById("custom-y").checked)
    return { min: dataMin, max: dataMax };
  const mn = document.getElementById("y-min").value;
  const mx = document.getElementById("y-max").value;
  return {
    min: mn !== "" ? parseFloat(mn) : dataMin,
    max: mx !== "" ? parseFloat(mx) : dataMax,
  };
}

// ── 清除圖表 ──────────────────────────────────────────────────
function clearCharts() {
  charts.forEach(c => c.destroy());
  charts = [];
  document.getElementById("charts-area").innerHTML = "";
}

// ── 查詢 ──────────────────────────────────────────────────────
async function runQuery() {
  if (selectedLat === null) return;

  const status = document.getElementById("status");
  status.textContent = "Searching...";
  clearCharts();

  try {
    const res = await fetch(`${API}/query/${datasetId}/grid?downsample=15`);
    const data = await res.json();
    drawBarCharts(data);
    status.textContent = "✓ ok";
  } catch(e) {
    status.textContent = `✗ ${e.message}`;
  }
}

// ── Bar Chart ─────────────────────────────────────────────────
function drawBarCharts(data) {
  const area   = document.getElementById("charts-area");
  const values = data.values;

  const groups = [
    {
      title:  "Flood Return Levels (m)",
      keys:   ["flood100","flood50","flood25"],
      colors: data.colors_g1,
    },
    {
      title:  "Surge & Topography (m)",
      keys:   ["surge100","surge50","surge25","topo"],
      colors: data.colors_g2,
    },
  ];

  const allVals = Object.values(values).filter(v => v !== null);
  const yRange  = allVals.length > 0
    ? getYRange(0, Math.max(...allVals) * 1.2)
    : { min: 0, max: 10 };

  groups.forEach(g => {
    const vals        = g.keys.map(k => values[k]);
    const colors      = g.keys.map((k, i) =>
      values[k] === null ? "#334155" : g.colors[i % g.colors.length]
    );
    const displayVals = vals.map(v => v === null ? 0 : v);
    const nullCount   = vals.filter(v => v === null).length;

    const box = document.createElement("div");
    box.className = "chart-box";
    box.innerHTML = `
      <h4>${g.title}<br>
      <small>lat: ${data.lat}, lon: ${data.lon}</small></h4>
      <canvas></canvas>
      ${nullCount > 0
        ? `<div class="null-warning">⚠ ${nullCount} 個變數在此位置無資料</div>`
        : ""}
    `;
    area.appendChild(box);

    charts.push(new Chart(box.querySelector("canvas"), {
      type: "bar",
      data: {
        labels: g.keys,
        datasets: [{
          data:            displayVals,
          backgroundColor: colors,
          borderRadius:    5,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const orig = vals[ctx.dataIndex];
                return orig === null ? "No data" : `${orig.toFixed(4)} m`;
              }
            }
          }
        },
        scales: {
          y: {
            min:   yRange.min,
            max:   yRange.max,
            title: { display:true, text:"meters" }
          }
        }
      }
    }));
  });
}
</script>
</body>
</html>
